name: Update Google Scholar stats

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Google Scholar stats
        env:
          SCHOLAR_USER_ID: Jcs-EDoAAAAJ
          OUT_PATH: scholar_stats.json
        run: python scripts/fetch_scholar_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_stats.json
          git diff --cached --quiet || git commit -m "Update Google Scholar stats"
          git push
